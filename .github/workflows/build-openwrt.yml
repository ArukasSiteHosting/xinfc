name: Build xinfc (OpenWRT)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-openwrt:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    container:
      image: ubuntu:20.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt update
          apt -y install \
            perl build-essential libncurses5-dev libmpfr-dev \
            libgmp-dev libpam-dev liblzma-dev file git rsync gawk wget \
            python3 python3-distutils python3-setuptools unzip swig

      - name: Build OpenWRT as regular user
        run: |
            set -eux
            cd /

            wget https://github.com/dimfishr/openwrt/archive/refs/tags/filogic-2025-07-01.zip
            unzip filogic-2025-07-01.zip

            cd openwrt-filogic-2025-07-01

            ./scripts/feeds update -a
            ./scripts/feeds install -a

            echo "CONFIG_TARGET_mediatek=y\n" > .config
            echo "CONFIG_TARGET_mediatek_filogic=y\n" >> .config
            echo "CONFIG_TARGET_MULTI_PROFILE=y\n" >> .config
            echo "CONFIG_TARGET_PER_DEVICE_ROOTFS=y\n" >> .config
            echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_xiaomi_mi-router-ax3000t=y\n" >> .config
            echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_xiaomi_mi-router-ax3000t-ubootmod=y\n" >> .config
            echo "CONFIG_PACKAGE_wpad-basic-mbedtls=m\n" >> .config
            echo "CONFIG_PACKAGE_libwolfsslcpu-crypto=y\n" >> .config
            echo "CONFIG_PACKAGE_wpad-wolfssl=y\n" >> .config
            echo "CONFIG_PACKAGE_dnsmasq=m\n" >> .config
            echo "CONFIG_PACKAGE_dnsmasq-full=y\n" >> .config
            echo "CONFIG_PACKAGE_kmod-nf-nathelper=y\n" >> .config
            echo "CONFIG_PACKAGE_kmod-nf-nathelper-extra=y\n" >> .config
            echo "CONFIG_PACKAGE_luci=y\n" >> .config
            echo "CONFIG_PACKAGE_luci-proto-wireguard=y\n" >> .config
            echo "CONFIG_PACKAGE_xl2tpd=y\n" >> .config
            export FORCE_UNSAFE_CONFIGURE=1

            make defconfig
            make download V=s
            make tools/install -j$(nproc) V=s || make tools/install V=s
            make toolchain/install -j$(nproc) V=s || make toolchain/install V=s
            make -j$(nproc) V=s || make V=s

      - name: Build xinfc
        run: |
          set -eux

          OPENWRT_DIR=/openwrt-filogic-2025-07-01
          TOOLCHAIN_DIR=$(find "$OPENWRT_DIR/staging_dir" -maxdepth 1 -type d -name 'toolchain-aarch64_cortex-a53_gcc-*_musl' | head -n1)
          KERNEL_SCRIPTS_DIR=$(find "$OPENWRT_DIR/build_dir/target-aarch64_cortex-a53_musl/linux-mediatek_filogic" -maxdepth 2 -type d -path '*/scripts/dtc' | head -n1)

          test -n "$TOOLCHAIN_DIR"
          test -n "$KERNEL_SCRIPTS_DIR"

          export PATH="$KERNEL_SCRIPTS_DIR:$TOOLCHAIN_DIR/bin:$OPENWRT_DIR/staging_dir/host/bin:$PATH"
          export CXX="$TOOLCHAIN_DIR/bin/aarch64-openwrt-linux-g++"

          cd "$GITHUB_WORKSPACE"
          bash build.sh

          file xinfc-wsc

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xinfc-wsc-openwrt-aarch64
          path: xinfc-wsc
